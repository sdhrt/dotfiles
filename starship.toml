command_timeout = 1000
add_newline = true

format = """
[в•ӯв”Җ](color2)\
    [гҖҗ](color7)\
      $username \
      [@](color7) \
      $directory\      
    [гҖ‘](color7)
[в•°в”Җ](color2)\
    $git_branch\
    $package\
    $python\
    $nodejs\
    $custom > """

palette = "pywal"
[palettes.pywal]
color0="#0D0C0B"
color1="#656555"
color2="#5B5E61"
color3="#5E6265"
color4="#67696B"
color5="#BA593C"
color6="#907566"
color7="#cebdac"
color8="#908478"


[memory_usage]
disabled = false
symbol = "пЎҡ "
threshold = -1
format = " [$symbol$ram](color1)"


[username]
show_always = true
format = "[$user](color1)"

[hostname]
ssh_only= false
format = "[$hostname](color1)"
disabled = false

[character]
success_symbol = " [$shell\\$](color7)"
error_symbol = " [$shellвң–](color7)"

[shell]
powershell_indicator = "п‘ _"
bash_indicator = "оҜҠ"
disabled= false


[time]
disabled = false
time_format = "%T"
format = "[ пҖ—$time](color5)"
use_12hr = true

[directory]
disabled = false
read_only = " п Ҫ"
truncation_length = 4
truncate_to_repo = false
format = "[$read_only](color4)[$path](color4) "
home_symbol = "пҖ•"

# [directory.substitution]
# "~" = "пҖ•"

[cmd_duration]
disabled = false
min_time = 2000
show_milliseconds = true
show_notifications = false
min_time_to_notify = 45_000
format = "[ пЁҡ$duration](color3) "

[git_status]
stashed = "пҖң \\(${count}\\) "
ahead = "пІ— ${count}"
behind = "пІ” ${count}"
diverged = "п§Ў ${ahead_count} ${behind_count}"
conflicted = "пҖӨ${count}"
deleted = " [пҖҚ${count}](color3)"
renamed = "п«Ұ${count}"
modified = "[ пҗҖ \\(${count}\\) ](color3)"
staged = " [пҖҢ ${count}](color3)"
untracked = " пҗҺ \\(${count}\\)"
format = "([$all_status$ahead_behind](color3)) "

[git_branch]
symbol = "пһЎ "
format = "[$symbol$branch](color7)"

[package]
symbol ="п’Ү "
display_private = true
version_format = "v${raw}"
format = "[$symbol$version](color4)"

#=== languages ===

[nodejs]
symbol = " пўҳ "
format = "[$symbol($version)](color7)"

[python]
symbol = " оҳҶ "
pyenv_prefix = 'pyenv '
python_binary = "python"
format = '[$symbol$pyenv_prefix$version(\($virtualenv\))](color7)'
